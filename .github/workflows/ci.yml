name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: pip install -e .[test]

      - name: Run tests
        run: pytest -q

  notify:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Email on failure or green-after-red
        uses: smarks/base_repo_template/.github/actions/notify@main
        with:
          job-status: ${{ needs.test.result }}
          mail-password: ${{ secrets.MAIL_PASSWORD }}
